<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Registro Studenti</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS 
    <link rel="stylesheet" href="style.css" />-->
  </head>

  <body>
    <div class="container">
      <h2 class="mb-4">Registro Studenti</h2>

      <!-- FORM -->
      <div class="card p-3 mb-3">
        <div class="row g-2">
          <div class="col-md-2">
            <input id="nome" class="form-control" placeholder="Nome" />
          </div>

          <div class="col-md-2">
            <input id="cognome" class="form-control" placeholder="Cognome" />
          </div>

          <div class="col-md-2">
            <input
              id="eta"
              type="number"
              class="form-control"
              placeholder="Età"
            />
          </div>

          <div class="col-md-2">
            <input
              id="voto"
              type="number"
              class="form-control"
              placeholder="Voto"
            />
          </div>

          <div class="col-md-2">
            <input id="sport1" class="form-control" placeholder="Sport 1" />
          </div>

          <div class="col-md-2">
            <input id="sport2" class="form-control" placeholder="Sport 2" />
          </div>
        </div>
      </div>

      <!-- BOTTONI -->
      <div class="mb-3 d-flex flex-wrap gap-2">
        <button class="btn btn-success" onclick="aggiungiStudente()">
          Aggiungi studente
        </button>
        <button class="btn btn-primary" onclick="mostraStudenti()">
          Mostra studenti
        </button>
        <button class="btn btn-warning" onclick="mediaVoti()">
          Media voti
        </button>
        <button class="btn btn-dark" onclick="primoStudente()">
          Primo studente
        </button>
        <button class="btn btn-info" onclick="aggiungiPromosso()">
          Aggiungi promosso
        </button>
        <button class="btn btn-danger" onclick="eliminaEtaPrimo()">
          Elimina età primo
        </button>
        <button class="btn btn-secondary" onclick="chiaviPrimo()">
          Chiavi primo studente
        </button>
        <button class="btn btn-secondary" onclick="valoriPrimo()">
          Valori primo studente
        </button>
        <button class="btn btn-outline-dark" onclick="clonaPrimo()">
          Clona primo studente
        </button>
      </div>

      <!-- OUTPUT -->
      <div id="output"></div>
    </div>

  <!--  <script src="main.js"></script>-->
  </body>
</html>
