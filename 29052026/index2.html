<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Registro Studenti</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container mt-4">
      <h2 class="mb-4 text-center">Registro Studenti</h2>

      <div class="row justify-content-center">
        <!-- FORM -->
        <div class="col-md-6">
          <div class="card p-3">
            <div class="mb-2">
              <label class="form-label">Nome e Cognome:</label>
              <input id="nome" class="form-control mb-2" placeholder="Nome" />

              <label class="form-label">Cognome:</label>
              <input
                id="cognome"
                class="form-control mb-2"
                placeholder="Cognome"
              />

              <label class="form-label">Età:</label>
              <input
                id="eta"
                type="number"
                class="form-control mb-2"
                placeholder="Età"
              />

              <label class="form-label">Voto:</label>
              <input
                id="voto"
                type="number"
                class="form-control mb-2"
                placeholder="Voto"
              />

              <label class="form-label">Sport:</label>
              <input
                id="sport1"
                class="form-control mb-2"
                placeholder="Sport 1"
              />
              <input
                id="sport2"
                class="form-control mb-2"
                placeholder="Sport 2"
              />
            </div>
          </div>
        </div>

        <!-- BOTTONI -->
        <div class="col-md-3 align-self-center">
          <div class="d-flex flex-column gap-2">
            <button class="btn btn-success" onclick="aggiungiStudente()">
              Aggiungi studente
            </button>
            <button class="btn btn-primary" onclick="mostraStudenti()">
              Mostra studenti
            </button>
            <button class="btn btn-warning" onclick="mediaVoti()">
              Media voti
            </button>
            <button class="btn btn-dark" onclick="primoStudente()">
              Primo studente
            </button>
            <button class="btn btn-info" onclick="aggiungiPromosso()">
              Aggiungi promosso
            </button>
            <button class="btn btn-danger" onclick="eliminaEtaPrimo()">
              Elimina età primo
            </button>
            <button class="btn btn-secondary" onclick="chiaviPrimo()">
              Chiavi primo studente
            </button>
            <button class="btn btn-secondary" onclick="valoriPrimo()">
              Valori primo studente
            </button>
            <button class="btn btn-outline-dark" onclick="clonaPrimo()">
              Clona primo studente
            </button>
          </div>
        </div>
      </div>

      <!-- OUTPUT -->
      <div class="row mt-4 justify-content-center">
        <div class="col-10">
          <div id="output" class="p-3 bg-white rounded shadow-sm"></div>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
